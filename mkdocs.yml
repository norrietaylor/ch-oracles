site_name: ch-oracles
site_description: Polyglot chore agent suite for GitHub Actions
repo_url: https://github.com/norrietaylor/ch-oracles
repo_name: norrietaylor/ch-oracles
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/svg/logo-light.svg
  favicon: assets/svg/favicon-light.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/brand.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/norrietaylor/ch-oracles

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Architecture: architecture.md
  - Languages:
      - Rust: languages/rust.md
      - Python: languages/python.md
      - Go: languages/go.md
      - TOML: languages/toml.md
      - Nickel: languages/ncl.md
  - Coexistence with spectacles: coexistence-with-spectacles.md

not_in_nav: |
  assets/**
