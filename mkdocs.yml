site_name: ch-oracles
site_description: Polyglot chore agent suite for GitHub Actions
repo_url: https://github.com/norrietaylor/ch-oracles
repo_name: norrietaylor/ch-oracles
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/svg/logo-light.svg
  favicon: assets/svg/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.action.edit
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: black
      accent: amber
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: black
      accent: amber

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/norrietaylor/ch-oracles

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Architecture: architecture.md
  - Languages:
      - Rust: languages/rust.md
      - Python: languages/python.md
      - Go: languages/go.md
      - TOML: languages/toml.md
      - Nickel: languages/ncl.md
  - Coexistence with spectacles: coexistence-with-spectacles.md
  - Decisions:
      - 0001 Not gating: ../decisions/0001-not-gating.md
      - 0002 Style mode flag: ../decisions/0002-style-mode-flag.md
      - 0003 Spectacles coexistence: ../decisions/0003-spectacles-coexistence.md
      - 0004 Polyglot worker: ../decisions/0004-polyglot-worker.md
      - 0005 Network egress: ../decisions/0005-network-egress.md
      - 0006 Engine split: ../decisions/0006-engine-split.md
      - 0007 Fragment sync policy: ../decisions/0007-fragment-sync-policy.md
