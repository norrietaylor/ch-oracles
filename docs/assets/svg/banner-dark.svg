<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <title>ch-oracles banner</title>
  <desc>ch-oracles README banner — dark theme.</desc>
  <rect width="1500" height="500" fill="#0e0e10"/>

  <!-- LEFT: wordmark and tagline anchor -->
  <g transform="translate(100 250)">
    <g transform="translate(0 -100)"><g transform="scale(1.1)">
        <circle cx="0" cy="0" r="30" fill="none" stroke="#f5f5f5" stroke-width="8"/>
        <circle cx="0" cy="0" r="6" fill="#9d4ed8"/>
    </g></g>
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="600" fill="#f5f5f5" letter-spacing="-2">ch-oracles</text>
    <text x="0" y="38" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400" fill="#a0a0a0" letter-spacing="-0.1">Chore agents for repo upkeep, built as GitHub Actions workflows.</text>
  </g>

  <!-- Subtle divider between wordmark and diagram -->
  <line x1="650" y1="120" x2="650" y2="380" stroke="#666666" stroke-width="1" opacity="0.5"/>

  <!-- RIGHT: workflow diagram -->
  <g transform="translate(1080 250)"><circle cx="-180" cy="0" r="5" fill="#f5f5f5"/>
        <line x1="-175" y1="0" x2="-69.0" y2="0" stroke="#f5f5f5" stroke-width="2" stroke-linecap="round"/>
        <text x="-180" y="-22" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">repo state</text>
        <g><g transform="scale(2.1)">
        <circle cx="0" cy="0" r="30" fill="none" stroke="#f5f5f5" stroke-width="8"/>
        <circle cx="0" cy="0" r="6" fill="#9d4ed8"/>
    </g></g>
        <text x="0" y="-85.0" text-anchor="middle" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">scry / divine</text>
        <line x1="69.0" y1="0" x2="110.0" y2="0" stroke="#f5f5f5" stroke-width="2" stroke-linecap="round"/>
        <circle cx="113.0" cy="0" r="4" fill="#f5f5f5"/>
        <path d="M 116.0 0 L 138.0 -44 L 158.0 -44" stroke="#f5f5f5" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="163.0" cy="-44" r="5" fill="#9d4ed8"/>
        <text x="177.0" y="-40" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">sweep</text>
        <line x1="116.0" y1="0" x2="158.0" y2="0" stroke="#f5f5f5" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="163.0" cy="0" r="5" fill="#9d4ed8"/>
        <text x="177.0" y="4" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">patch</text>
        <path d="M 116.0 0 L 138.0 44 L 158.0 44" stroke="#f5f5f5" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="163.0" cy="44" r="5" fill="#9d4ed8"/>
        <text x="177.0" y="48" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#f5f5f5">archive</text></g>
</svg>